{% extends "base.html" %}
{% block title %}Login — HR Portal{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg,#1e293b 0%,#2563eb 100%);">
  <div class="card border-0 shadow-lg" style="width:100%;max-width:420px;border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="mb-3" style="font-size:2.5rem;color:#2563eb;"><i class="bi bi-building"></i></div>
        <h4 class="fw-bold text-dark mb-1">Welcome Back</h4>
        <p class="text-muted small">Sign in to your HR Portal account</p>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" name="email" class="form-control border-start-0 bg-light" placeholder="you@company.com" required autofocus />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="password" id="pwd" class="form-control border-start-0 bg-light" placeholder="••••••••" required />
            <button type="button" class="btn btn-light border" onclick="togglePwd()"><i class="bi bi-eye" id="eye-icon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
      </form>

      <hr class="my-4" />
      <p class="text-center text-muted small mb-0">
        New employee? <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Create an account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
  const p = document.getElementById('pwd');
  const i = document.getElementById('eye-icon');
  p.type = p.type === 'password' ? 'text' : 'password';
  i.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
