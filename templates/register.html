{% extends "base.html" %}
{% block title %}Register — HR Portal{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4" style="background: linear-gradient(135deg,#1e293b 0%,#2563eb 100%);">
  <div class="card border-0 shadow-lg" style="width:100%;max-width:460px;border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="mb-3" style="font-size:2.5rem;color:#2563eb;"><i class="bi bi-person-plus"></i></div>
        <h4 class="fw-bold text-dark mb-1">Create Your Account</h4>
        <p class="text-muted small">Step 1 of 7 — You'll complete your profile after sign-up</p>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" class="form-control border-start-0 bg-light" placeholder="johndoe" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" name="email" class="form-control border-start-0 bg-light" placeholder="you@company.com" required />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" id="pwd" class="form-control bg-light" placeholder="••••••••" required minlength="6" />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" id="cpwd" class="form-control bg-light" placeholder="••••••••" required />
          <div id="pwd-match-msg" class="form-text"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account & Continue</button>
      </form>

      <hr class="my-4" />
      <p class="text-center text-muted small mb-0">
        Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const pwd = document.getElementById('pwd');
const cpwd = document.getElementById('cpwd');
const msg = document.getElementById('pwd-match-msg');
function checkMatch() {
  if (cpwd.value === '') { msg.textContent = ''; return; }
  if (pwd.value === cpwd.value) {
    msg.textContent = '✓ Passwords match';
    msg.className = 'form-text text-success';
  } else {
    msg.textContent = '✗ Passwords do not match';
    msg.className = 'form-text text-danger';
  }
}
pwd.addEventListener('input', checkMatch);
cpwd.addEventListener('input', checkMatch);
</script>
{% endblock %}
